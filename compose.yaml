services:
  valkey:
    image: valkey/valkey:8
    container_name: flow-bench-valkey
    ports:
      - "6379:6379"
    command: ["valkey-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - valkey-data:/data

  postgres:
    image: postgres:17
    container_name: flow-bench-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: flow
      POSTGRES_USER: flow
      POSTGRES_PASSWORD: flow
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  valkey-data:
  postgres-data:
